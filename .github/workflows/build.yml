name: build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - v*.**
  merge_group:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency: # cancel in-progress runs of the same workflow for the same PR, but allow multiple runs for different PRs or for pushes to main
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      msrv-version: ${{ steps.get-versions.outputs.msrv-version }}
      stable-version: ${{ steps.get-versions.outputs.stable-version }}
      git-version: ${{ steps.get-versions.outputs.git-version }}
      target-ref: ${{ steps.get-versions.outputs.targetref }}
      targets: ${{ steps.get-targets.outputs.targets }}
      go-targets: ${{ steps.get-go-targets.outputs.go-targets }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'true'
          fetch-depth: 0
          fetch-tags: true
      - name: Check JSON syntax
        run: ./scripts/json/check_json_syntax.sh --quiet
      - name: Check JSON formatting
        run: ./scripts/json/check_json_formatting.sh --quiet
      - name: Check JSON sorting
        run: ./scripts/json/check_json_sorting.sh --quiet
      - name: Update rustup
        run: rustup update stable --no-self-update
      - name: Format check
        run: |
          rustup component add rustfmt
          cargo fmt --all -- --check -l
      - name: Check assets are up-to-date
        run: |
          ./update_assets.sh
          if ! git diff --quiet; then
            echo "::error::Assets are out of date. Please run ./update_assets.sh locally and commit the changes."
            git diff --stat
            exit 1
          fi
      - name: Extract versions
        id: get-versions
        run: |
          MSRV=$(cargo metadata --no-deps --format-version=1 --locked | jq -r '.packages[0].rust_version')
          echo "msrv-version=$MSRV" >> $GITHUB_OUTPUT
          STABLE_VERSION=$(rustc +stable --version | awk '{print $2}')
          echo "stable-version=$STABLE_VERSION" >> $GITHUB_OUTPUT
          GIT_VERSION=$(git describe --tags)
          echo "git-version=$GIT_VERSION" >> $GITHUB_OUTPUT
          if [[ ${{ github.event_name }} == "pull_request" ]]; then
            TARGETREF=--ref=${{ github.head_ref }}
          else
            TARGETREF=--defaultRef=${{ github.ref_name }}
          fi
          echo "targetref=$TARGETREF" >> $GITHUB_OUTPUT
      - name: Compute build targets
        id: get-targets # this is a bit hacky but it allows us to have different targets for PRs and for main/tag builds without having to duplicate the entire matrix strategy
        run: |
          FULL_TARGETS=$(jq -cn '[
            {"arch": "x86_64-unknown-linux-gnu",  "runs-on": "ubuntu-latest"},
            {"arch": "aarch64-unknown-linux-gnu", "runs-on": "ubuntu-24.04-arm"},
            {"arch": "aarch64-apple-darwin",      "runs-on": "macos-latest"},
            {"arch": "x86_64-apple-darwin",       "runs-on": "macos-latest"},
            {"arch": "x86_64-pc-windows-msvc",    "runs-on": "windows-latest",  "ext": ".exe"}
          ]')
          PR_TARGETS=$(jq -cn '[
            {"arch": "x86_64-unknown-linux-gnu",  "runs-on": "ubuntu-latest"}
          ]')
          if [[ ${{ github.event_name }} == "pull_request" ]]; then
            echo "targets=$PR_TARGETS" >> $GITHUB_OUTPUT
          else
            echo "targets=$FULL_TARGETS" >> $GITHUB_OUTPUT
          fi
      - name: Compute Go build targets
        id: get-go-targets
        run: |
          FULL_GO_TARGETS=$(jq -cn '[
            {"target-arch": "x86_64-unknown-linux-gnu",  "runs-on": "ubuntu-latest",    "lib-ext": ".so"},
            {"target-arch": "aarch64-unknown-linux-gnu", "runs-on": "ubuntu-24.04-arm", "lib-ext": ".so"},
            {"target-arch": "aarch64-apple-darwin",      "runs-on": "macos-latest",     "lib-ext": ".dylib"},
            {"target-arch": "x86_64-apple-darwin",       "runs-on": "macos-latest",     "lib-ext": ".dylib"}
          ]')
          PR_GO_TARGETS=$(jq -cn '[
            {"target-arch": "x86_64-unknown-linux-gnu",  "runs-on": "ubuntu-latest",    "lib-ext": ".so"}
          ]')
          if [[ ${{ github.event_name }} == "pull_request" ]]; then
            echo "go-targets=$PR_GO_TARGETS" >> $GITHUB_OUTPUT
          else
            echo "go-targets=$FULL_GO_TARGETS" >> $GITHUB_OUTPUT
          fi
      - name: Publish dry-run
        if: github.ref_type != 'tag'
        run: |
          cargo publish --dry-run --verbose --no-verify --locked

  build-matrix:
    needs: prepare
    permissions:
      contents: write
    strategy:
      matrix:
        version: 
          - ${{ needs.prepare.outputs.msrv-version }}
          - ${{ needs.prepare.outputs.stable-version }}
        target: ${{ fromJson(needs.prepare.outputs.targets) }}
    runs-on: ${{ matrix.target.runs-on }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'true'
      - name: Use cache
        id: rust-cache
        uses: Swatinem/rust-cache@v2
        with:
          key: build-${{matrix.version}}-${{ matrix.target.arch }}-${{ needs.prepare.outputs.git-version }}
      - name: Update rustup
        if: steps.rust-cache.outputs.cache-hit != 'true'
        run: rustup update stable --no-self-update
      - name: Set Rust version
        if: steps.rust-cache.outputs.cache-hit != 'true'
        run: |
          rustup override set ${{ matrix.version }}
          rustup default ${{ matrix.version }}
      - name: Prepare target
        if: steps.rust-cache.outputs.cache-hit != 'true'
        run: rustup target add ${{ matrix.target.arch }}
      - name: Install clippy
        run: |
          # this is necesary because clippy ignores the target flag
          rustup component add clippy 
          rustup component add --toolchain ${{ matrix.version }}-${{ matrix.target.arch }} clippy
      - name: Install cargo-auditable
        if: steps.rust-cache.outputs.cache-hit != 'true'
        run: cargo install cargo-auditable --locked
      - name: Clippy check
        run: cargo clippy --all-targets --locked --target=${{ matrix.target.arch }} -- -D warnings
      - name: Build
        run: cargo auditable build --locked --target=${{ matrix.target.arch }} --release --verbose
      - name: Run tests
        run: cargo test --locked --target=${{ matrix.target.arch }} --verbose
        if: ${{ matrix.target.skip-test != true }}
      - name: Archive csaf-validator (${{ matrix.target.arch }})
        uses: actions/upload-artifact@v4
        with:
          name: csaf-validator-${{ matrix.target.arch }}-${{ matrix.version }}-${{ needs.prepare.outputs.git-version }}
          path: target/${{ matrix.target.arch }}/release/csaf-validator${{ matrix.target.ext }}
      - name: Archive libcsaf_ffi (${{ matrix.target.arch }})
        if: ${{ matrix.target.skip-test != true }}
        uses: actions/upload-artifact@v4
        with:
          name: libcsaf_ffi-${{ matrix.target.arch }}-${{ matrix.version }}-${{ needs.prepare.outputs.git-version }}
          path: |
            target/${{ matrix.target.arch }}/release/libcsaf_ffi.a
            target/${{ matrix.target.arch }}/release/libcsaf_ffi.so
            target/${{ matrix.target.arch }}/release/libcsaf_ffi.dylib
            target/${{ matrix.target.arch }}/release/csaf_ffi.dll
          if-no-files-found: ignore
      - name: Generate CycloneDX SBOM
        if: matrix.version == needs.prepare.outputs.stable-version
        uses: anchore/sbom-action@v0.24.0
        with:
          file: ./target/${{ matrix.target.arch }}/release/csaf-validator${{ matrix.target.ext }}
          format: cyclonedx-json
          artifact-name: csaf-validator_${{ matrix.target.arch }}_${{ matrix.version }}_${{ needs.prepare.outputs.git-version }}_sbom.cdx.json
      - name: Generate SPDX SBOM
        if: matrix.version == needs.prepare.outputs.stable-version
        uses: anchore/sbom-action@v0.24.0
        with:
          file: ./target/${{ matrix.target.arch }}/release/csaf-validator${{ matrix.target.ext }}
          format: spdx-json
          artifact-name: csaf-validator_${{ matrix.target.arch }}_${{ matrix.version }}_${{ needs.prepare.outputs.git-version }}_sbom.spdx.json


  build-platforms:
    needs: build-matrix
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check build status
        if: needs.build-matrix.result != 'success'
        run: exit 1

  wasm-bindings:
    needs:
      - prepare
      - build-platforms
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'true'
      - name: Use cache
        uses: Swatinem/rust-cache@v2
        with:
          key: wasm-bindings
      - name: Update rustup
        run: rustup update stable --no-self-update
      - name: Prepare target
        run: rustup target add wasm32-unknown-unknown
      - name: Install uniffi-bindgen-js
        run: cargo install uniffi-bindgen-js --version 0.2.1 --locked
      - name: Build UniFFI WASM bindings
        run: bash generate_wasm_bindings.sh
      - name: NPM publish dry-run
        working-directory: ./wasm
        run: npm publish --dry-run
      - name: Archive UniFFI WASM bindings
        uses: actions/upload-artifact@v4
        with:
          name: csaf-ffi-wasm-${{ needs.prepare.outputs.git-version }}
          path: wasm/
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0.24.0
        with:
          file: ./target/wasm32-unknown-unknown/release/csaf_ffi.wasm
          format: cyclonedx-json
          artifact-name: csaf-ffi-wasm_${{ needs.prepare.outputs.git-version }}_sbom.cdx.json
      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0.24.0
        with:
          file: ./target/wasm32-unknown-unknown/release/csaf_ffi.wasm
          format: spdx-json
          artifact-name: csaf-ffi-wasm_${{ needs.prepare.outputs.git-version }}_sbom.spdx.json

  go-bindings:
    needs:
      - prepare
      - build-platforms
    strategy:
      matrix:
        target: ${{ fromJson(needs.prepare.outputs.go-targets) }}
    runs-on: ${{ matrix.target.runs-on }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'true'
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: Use cache
        uses: Swatinem/rust-cache@v2
        with:
          key: go-bindings-${{ matrix.target.target-arch }}
      - name: Install uniffi-bindgen-go
        run: |
          cargo install uniffi-bindgen-go \
            --git https://github.com/NordSecurity/uniffi-bindgen-go \
            --tag v0.7.0+v0.31.0 --locked
      - name: Download libcsaf_ffi
        uses: actions/download-artifact@v4
        with:
          name: libcsaf_ffi-${{ matrix.target.target-arch }}-${{ needs.prepare.outputs.stable-version }}-${{ needs.prepare.outputs.git-version }}
          path: target/${{ matrix.target.target-arch }}/release/
      - name: Generate Go bindings
        run: |
          uniffi-bindgen-go \
            --library target/${{ matrix.target.target-arch }}/release/libcsaf_ffi${{ matrix.target.lib-ext }} \
            --out-dir go/
      - name: Copy static library for CGo
        run: |
          GOOS=$(go env GOOS)
          GOARCH=$(go env GOARCH)
          LIB_DIR="go/csaf_ffi/lib/${GOOS}_${GOARCH}"
          mkdir -p "$LIB_DIR"
          cp target/${{ matrix.target.target-arch }}/release/libcsaf_ffi.a "$LIB_DIR/"
      - name: Run Go tests
        working-directory: go
        run: go test -v ./csaf_ffi/
      - name: Archive Go static library
        uses: actions/upload-artifact@v4
        with:
          name: go-csaf-ffi-lib-${{ runner.os }}-${{ runner.arch }}
          path: go/csaf_ffi/lib/

  devguard-secret-scanning: # uses gitleaks
    if: github.event_name != 'pull_request' || (github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]')
    needs: 
      - prepare
      - build-platforms
    runs-on: ubuntu-latest
    steps:
      - name: Run devguard-scanner secret-scanning
        uses: docker://ghcr.io/l3montree-dev/devguard/scanner:main-latest
        with:
          args: devguard-scanner secret-scanning --assetName=${{ vars.DEVGUARD_ASSET }} --token="${{ secrets.DEVGUARD_TOKEN }}"  ${{ needs.prepare.outputs.target-ref }}  --isTag=${{ github.ref_type == 'tag' }}
  devguard-sast: #uses semgrep
    if: github.event_name != 'pull_request' || (github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]')
    needs: 
      - prepare
      - build-platforms
    runs-on: ubuntu-latest
    steps:
      - name: Run devguard-scanner sast
        uses: docker://ghcr.io/l3montree-dev/devguard/scanner:main-latest
        with:
          args: devguard-scanner sast --assetName=${{ vars.DEVGUARD_ASSET }} --token="${{ secrets.DEVGUARD_TOKEN }}" ${{ needs.prepare.outputs.target-ref }}  --isTag=${{ github.ref_type == 'tag' }}
  devguard-iac: # uses checkov
    needs: 
      - prepare
      - build-platforms
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || (github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]')
    steps:
      - name: Run devguard-scanner iac
        uses: docker://ghcr.io/l3montree-dev/devguard/scanner:main-latest
        with:
          args: devguard-scanner iac --assetName=${{ vars.DEVGUARD_ASSET }} --token="${{ secrets.DEVGUARD_TOKEN }}" ${{ needs.prepare.outputs.target-ref }} --isTag=${{ github.ref_type == 'tag' }}
  process-sboms:
    if: github.event_name != 'pull_request' || (github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]')
    needs: 
      - prepare
      - build-platforms
      - wasm-bindings
    runs-on: ubuntu-latest
    steps:
      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
 
      - name: Cache devguard-scanner
        id: cache-scanner
        uses: actions/cache@v4
        with:
          path: ~/go/bin/devguard-scanner
          key: devguard-scanner-${{ runner.os }}
      - name: Install devguard-scanner
        if: steps.cache-scanner.outputs.cache-hit != 'true'
        run: |
          go install github.com/l3montree-dev/devguard/cmd/devguard-scanner@v1.2.0
      
      - name: Download all CDX artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*_sbom.cdx.json'
          path: sboms/
      
      - name: Process CDX files
        run: |
          for cdx_file in $(find sboms -type f -name "*.cdx.json"); do
            echo "Processing: $cdx_file"
            
            filename=$(basename "$cdx_file")
            # Strip _sbom.cdx.json suffix to get the artifact name
            artifactName=${filename%_sbom.cdx.json}

            echo "Artifact: $artifactName"

            tagOpt=""

            if [[ ${{ github.ref_type }} == 'tag' ]]; then
              tagOpt="--isTag=true"
            fi
            
            devguard-scanner sbom "$cdx_file" --assetName="${{ vars.DEVGUARD_ASSET }}" --token="${{ secrets.DEVGUARD_TOKEN }}" --artifactName="$artifactName" ${{ needs.prepare.outputs.target-ref }} $tagOpt  2>&1
          done

  publish-crates:
    runs-on: ubuntu-latest
    permissions:
      id-token: write    
    needs:
      - build-platforms
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, 'beta') && !contains(github.ref, 'alpha')
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'true'
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: Update rustup
        run: rustup update stable --no-self-update
      - name: Publish
        run: cargo publish --locked --verbose
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write    
    needs:
      - prepare
      - wasm-bindings
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, 'beta') && !contains(github.ref, 'alpha')
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'true'
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Download WASM bindings
        uses: actions/download-artifact@v4
        with:
          name: csaf-ffi-wasm-${{ needs.prepare.outputs.git-version }}
          path: wasm/
      - name: Publish to NPM
        working-directory: ./wasm
        run: |
          npm publish --provenance

  publish-go:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - go-bindings
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, 'beta') && !contains(github.ref, 'alpha')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: Download Go library for verification
        uses: actions/download-artifact@v4
        with:
          name: go-csaf-ffi-lib-Linux-X64
          path: go/csaf_ffi/lib/
      - name: Verify Go module builds
        working-directory: ./go
        run: |
          CGO_LDFLAGS="-L$(pwd)/csaf_ffi/lib/linux_amd64" go build ./...
      - name: Push Go module tag
        run: |
          GO_TAG="go/${{ github.ref_name }}"
          if ! git rev-parse -q --verify "refs/tags/$GO_TAG" >/dev/null 2>&1; then
            git tag "$GO_TAG"
            git push origin "$GO_TAG"
          else
            echo "Tag $GO_TAG already exists, skipping."
          fi
      - name: Publish to Go module proxy
        run: GOPROXY=proxy.golang.org go list -m "github.com/csaf-rs/csaf/go@${{ github.ref_name }}"

  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - prepare
      - publish-crates
      - publish-npm
      - publish-go
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, 'beta') && !contains(github.ref, 'alpha')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: csaf-validator
          pattern: csaf-validator-*-${{ needs.prepare.outputs.stable-version }}-*
      - uses: actions/download-artifact@v4
        with:
          path: csaf-ffi-wasm
          pattern: csaf-ffi-wasm-*
      - uses: actions/download-artifact@v4
        with:
          path: go-csaf-ffi-lib
          pattern: go-csaf-ffi-lib-*
      - uses: actions/download-artifact@v4
        with:
          path: sboms
          pattern: '*_sbom.*'
      - name: Zip Artifacts
        run: |
          ls csaf-validator | xargs -I {} zip {}.zip -rj csaf-validator/{}
          ls csaf-validator-*.zip
          for dir in csaf-ffi-wasm/*/; do
            name=$(basename "$dir")
            zip "${name}.zip" -rj "$dir"
          done
          ls csaf-ffi-wasm-*.zip 2>/dev/null || true
          for dir in go-csaf-ffi-lib/*/; do
            name=$(basename "$dir")
            zip "${name}.zip" -rj "$dir"
          done
          ls go-csaf-ffi-lib-*.zip 2>/dev/null || true
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: false
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            csaf-validator-*.zip
            csaf-ffi-wasm-*.zip
            go-csaf-ffi-lib-*.zip
            sboms/**/*.json
